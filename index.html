<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Odds</title>
<style>body{background:#0a0e14;color:#eee;font-family:-apple-system,sans-serif;padding:16px}input,select{width:100%;padding:12px;margin:6px 0;background:#1a2234;color:#fff;border:1px solid #333;border-radius:8px;font-size:16px;box-sizing:border-box}button{width:100%;padding:14px;background:#5b8dff;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;margin-top:8px}.m{padding:10px;border-bottom:1px solid #333}.m b{font-size:11px;color:#7d8aa8;display:block}.o{display:flex;gap:6px;margin-top:6px}.o div{flex:1;background:#1a2234;padding:6px;text-align:center;border-radius:6px}#st{text-align:center;color:#888;padding:8px;font-size:13px;min-height:18px}.tabs{display:flex;gap:6px;margin:10px 0}.tab{flex:1;padding:10px;text-align:center;background:#1a2234;border-radius:8px;border:1px solid #333;font-size:14px;cursor:pointer}.tab.active{background:#5b8dff;border-color:#5b8dff}.hint{font-size:12px;color:#7d8aa8;margin:2px 0 8px}.dbg{background:#111826;border:1px solid #333;border-radius:8px;padding:10px;margin-top:8px;font-size:11px;white-space:pre-wrap;word-break:break-all;color:#8fa}.chk{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px;color:#aaa}.chk input{width:auto;margin:0}</style></head>
<body><h2>Odds Sharp</h2>

<div class="tabs">
  <div class="tab active" id="tabLive" onclick="setMode('live')">Odds ao vivo (análise)</div>
  <div class="tab" id="tabClose" onclick="setMode('close')">Odds de fecho (histórico)</div>
</div>

<input id=k placeholder="API key OddsPapi">
<input id=fid placeholder="ID do jogo (fixtureId) - opcional, filtra so este jogo">
<div class="hint">Se preencheres o fixtureId, ignora competicao/datas e vai direto a esse jogo.</div>
<input id=comp placeholder="Nome da competicao (ex: World Cup)" value="World Cup">
<input id=d1 type=date>
<input id=d2 type=date>
<select id=bk><option value=pinnacle>Pinnacle</option><option value=polymarket>Polymarket</option><option value=kalshi>Kalshi</option><option value=fanduel>FanDuel</option><option value=draftkings>DraftKings</option><option value=bet365>Bet365</option></select>

<div class="chk"><input type="checkbox" id="dbg"> <label for="dbg">Modo debug (mostra JSON em bruto do snapshot escolhido)</label></div>

<button onclick="run()">Puxar jogos e odds</button>
<div id=st></div><div id=r></div>
<button id=cp style="display:none" onclick="cop()">Copiar tudo</button>

<script>
let txt="";
let mode="live";
const today=new Date();
const in10=new Date(today.getTime()+9*86400000);
document.getElementById('d1').value=today.toISOString().slice(0,10);
document.getElementById('d2').value=in10.toISOString().slice(0,10);

function f(v){return v==null?"-":Number(v).toFixed(2)}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}

function setMode(m){
  mode=m;
  document.getElementById('tabLive').classList.toggle('active',m==='live');
  document.getElementById('tabClose').classList.toggle('active',m==='close');
  document.getElementById('r').innerHTML="";
  document.getElementById('cp').style.display='none';
  setSt(m==='close' ? "Modo fecho: vai buscar o odds historico mais proximo do kickoff." : "Modo ao vivo: odds actuais.");
}

async function getFixturesList(k,comp,d1,d2,fid){
  const url1=`https://api.oddspapi.io/v4/fixtures?apiKey=${encodeURIComponent(k)}&sportId=10&from=${d1}&to=${d2}`;
  const res1=await fetch(url1);
  if(!res1.ok) throw new Error("Erro fixtures: "+res1.status);
  const fixtures=await res1.json();
  if(!Array.isArray(fixtures)) throw new Error("Resposta inesperada da API (fixtures)");

  let matched=fixtures.filter(fx=>fx.hasOdds);
  if(fid){
    matched=matched.filter(fx=>String(fx.fixtureId)===String(fid));
    if(matched.length===0){
      matched=[{fixtureId:fid,participant1Name:"?",participant2Name:"?",startTime:"",tournamentName:"",hasOdds:true}];
    }
  }else{
    const c=(comp||"").toLowerCase();
    matched=matched.filter(fx=>{
      const tn=(fx.tournamentName||"").toLowerCase();
      return c==""||tn.includes(c);
    });
  }
  return matched;
}

function extractOutcomes(obj,bk){
  const tries=[
    ()=>obj.bookmakerOdds[bk].markets["101"].outcomes,
    ()=>obj.markets["101"].outcomes,
    ()=>obj.odds.bookmakerOdds[bk].markets["101"].outcomes,
    ()=>obj.data.bookmakerOdds[bk].markets["101"].outcomes
  ];
  for(const t of tries){
    try{
      const outs=t();
      if(outs) return outs;
    }catch(e){}
  }
  return null;
}

function outcomesToHXA(outs){
  if(!outs) return {h1:null,x:null,h2:null};
  try{
    return {
      h1: outs["101"].players["0"].price,
      x:  outs["102"].players["0"].price,
      h2: outs["103"].players["0"].price
    };
  }catch(e){ return {h1:null,x:null,h2:null} }
}

function getTimestamp(item){
  return item.createdAt||item.timestamp||item.updatedAt||item.time||null;
}

function pickClosestToKickoff(history,startTimeIso){
  if(!Array.isArray(history)||history.length===0) return null;
  if(!startTimeIso){
    return history[history.length-1];
  }
  const target=new Date(startTimeIso).getTime();
  let best=null,bestDiff=Infinity,bestBefore=null,bestBeforeDiff=Infinity;
  for(const item of history){
    const ts=getTimestamp(item);
    if(!ts) continue;
    const t=new Date(ts).getTime();
    const diff=Math.abs(t-target);
    if(diff<bestDiff){bestDiff=diff;best=item}
    if(t<=target && diff<bestBeforeDiff){bestBeforeDiff=diff;bestBefore=item}
  }
  return bestBefore||best;
}

async function run(){
  const k=document.getElementById('k').value.trim();
  if(!k){setSt("Falta API key",true);return}
  const fid=document.getElementById('fid').value.trim();
  const comp=document.getElementById('comp').value.trim();
  const d1=document.getElementById('d1').value;
  const d2=document.getElementById('d2').value;
  const bk=document.getElementById('bk').value;
  const debug=document.getElementById('dbg').checked;
  if(!d1||!d2){setSt("Escolhe as datas",true);return}

  document.getElementById('r').innerHTML="";
  document.getElementById('cp').style.display='none';
  setSt("A procurar jogos...");

  try{
    const matched=await getFixturesList(k,comp,d1,d2,fid);
    if(matched.length===0){setSt("0 jogos encontrados para '"+comp+"' nessas datas",false);return}
    setSt(matched.length+" jogo(s). A puxar odds "+bk+" ("+(mode==='close'?"fecho/historico":"ao vivo")+")...");

    let h="",t=(mode==='close'?"Odds FECHO ":"Odds ")+bk+" - "+(comp||fid)+"\n\n",n=0;

    for(const fx of matched){
      let h1=null,x=null,h2=null,extraInfo="",debugJson=null;

      if(mode==='live'){
        try{
          const url2=`https://api.oddspapi.io/v4/odds?apiKey=${encodeURIComponent(k)}&fixtureId=${encodeURIComponent(fx.fixtureId)}&bookmakers=${bk}`;
          const res2=await fetch(url2);
          if(res2.ok){
            const od=await res2.json();
            const outs=extractOutcomes(od,bk);
            ({h1,x,h2}=outcomesToHXA(outs));
            if(debug) debugJson=od;
          }
        }catch(e){}
      }else{
        try{
          const url2=`https://api.oddspapi.io/v4/historical-odds?apiKey=${encodeURIComponent(k)}&fixtureId=${encodeURIComponent(fx.fixtureId)}&bookmakers=${bk}`;
          const res2=await fetch(url2);
          if(res2.ok){
            const hist=await res2.json();
            const list=Array.isArray(hist)?hist:(hist.history||hist.data||[]);
            const chosen=pickClosestToKickoff(list,fx.startTime);
            if(chosen){
              const outs=extractOutcomes(chosen,bk);
              ({h1,x,h2}=outcomesToHXA(outs));
              const ts=getTimestamp(chosen);
              extraInfo=" (snapshot: "+(ts?String(ts).replace("T"," ").slice(0,16):"?")+" · "+list.length+" no historico)";
              if(debug) debugJson=chosen;
            }else{
              extraInfo=" (sem historico disponivel)";
            }
          }
        }catch(e){}
      }

      const t1=fx.participant1Name||"?", t2=fx.participant2Name||"?";
      const when=(fx.startTime||"").replace("T"," ").slice(0,16);
      n++;
      h+=`<div class=m><b>${when} ${esc(extraInfo)}</b>${esc(t1)} x ${esc(t2)}<div class=o><div>1: ${f(h1)}</div><div>X: ${f(x)}</div><div>2: ${f(h2)}</div></div>${debugJson?`<div class=dbg>${esc(JSON.stringify(debugJson,null,1))}</div>`:""}</div>`;
      t+=`${t1} x ${t2} - ${when}${mode==='close'?extraInfo:""}\n1: ${f(h1)} | X: ${f(x)} | 2: ${f(h2)}\n\n`;
      await new Promise(r=>setTimeout(r,900));
    }

    document.getElementById('r').innerHTML=h;
    setSt(n+" jogo(s) mostrados");
    txt=t.trim();
    document.getElementById('cp').style.display=n?'block':'none';

  }catch(e){
    setSt("Erro: "+e.message,true);
  }
}

function setSt(msg,err){
  const s=document.getElementById('st');
  s.textContent=msg;
  s.style.color=err?"#ff6b6b":"#888";
}

function cop(){
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById('cp');
    b.textContent="Copiado!";
    setTimeout(()=>{b.textContent="Copiar tudo"},1200);
  });
}
</script></body></html>
